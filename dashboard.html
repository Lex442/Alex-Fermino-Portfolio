<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Paradas e Monitoramento | Projeto</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#07111f;
      color:#eef4ff;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:40px 20px 60px;
      text-align:center;
    }
    h1{
      margin:0 0 12px;
      font-size:42px;
    }
    p{
      margin:0 auto 28px;
      max-width:900px;
      color:#b6c3d8;
      font-size:18px;
      line-height:1.6;
    }
    img{
      width:100%;
      max-width:900px;
      border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.08);
    }
    a{
      display:inline-block;
      margin-top:28px;
      padding:14px 22px;
      border-radius:10px;
      text-decoration:none;
      color:white;
      font-weight:700;
      background:linear-gradient(180deg, #2f8cff, #1e66d8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sistema de Paradas e Monitoramento</h1>
    <p>
      Fluxo de funcionamento do sistema de monitoramento: o sensor detecta a máquina,
      a ESP32 coleta os dados, organiza por turno, cria uma rede Wi-Fi com HTML
      para visualização e disponibiliza o painel em celular, tablet e TV.
    </p>

    <img src="images/Fluxo de monitoramento dasbord.png" alt="Fluxo do sistema de paradas e monitoramento">

    <br>
    <a href="index.html">Voltar para o site</a>
  </div>
